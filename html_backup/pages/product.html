<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Product Details — Sasmika Mobiles</title>
    <meta name="description" content="View product details, specifications, and pricing at Sasmika Mobiles.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
    <div class="preloader" id="preloader"><div class="preloader-inner"><div class="preloader-icon"></div><span class="preloader-text">Sasmika Mobiles</span></div></div>

    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="../index.html" class="nav-logo"><span class="logo-icon">📱</span><span class="logo-text">Sasmika <span class="logo-highlight">Mobiles</span></span></a>
            <ul class="nav-links" id="nav-links">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="gallery.html" class="nav-link">Gallery</a></li>
                <li><a href="services.html" class="nav-link">Services</a></li>
                <li><a href="offers.html" class="nav-link">Offers</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="favorites.html" class="nav-icon-btn" aria-label="Favorites"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span class="badge" id="fav-count">0</span></a>
                <a href="cart.html" class="nav-icon-btn" aria-label="Cart"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span class="badge" id="cart-count">0</span></a>
                <a href="login.html" class="btn btn-primary btn-sm">Login</a>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <section class="product-detail container" id="product-detail-container">
        <!-- Loaded via JS -->
    </section>

    <section class="related-products container">
        <div class="section-header">
            <span class="section-tag">Similar</span>
            <h2 class="section-title">Related <span class="gradient-text">Products</span></h2>
        </div>
        <div class="products-grid" id="related-products-grid"></div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top:none;padding-top:0;">
                <p>&copy; 2025 Sasmika Mobiles. All rights reserved.</p>
                <p>Made with ❤️ for our customers</p>
            </div>
        </div>
    </footer>

    <a href="https://wa.me/918526033272" class="whatsapp-float" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const productId = getUrlParam('id');
            if (!productId) {
                window.location.href = 'gallery.html';
                return;
            }
            renderProductDetail(productId);
            renderRelatedProducts(productId);
        });

        function renderProductDetail(id) {
            const product = getProduct(id);
            if (!product) {
                document.getElementById('product-detail-container').innerHTML = `
                    <div class="empty-state"><div class="empty-state-icon">🔍</div><h3>Product Not Found</h3><p>The product you're looking for doesn't exist.</p><a href="gallery.html" class="btn btn-primary btn-md">Browse Gallery</a></div>`;
                return;
            }

            const category = STORE_DATA.categories.find(c => c.id === product.category);
            const fav = isFavorite(product.id);
            const stars = '★'.repeat(Math.floor(product.rating)) + '☆'.repeat(5 - Math.floor(product.rating));
            const specs = product.specs.split('|').map(s => s.trim());

            document.title = `${product.name} — Sasmika Mobiles`;

            document.getElementById('product-detail-container').innerHTML = `
                <div class="page-breadcrumb" style="margin-bottom: var(--space-6); padding-top: calc(80px + var(--space-6));">
                    <a href="../index.html">Home</a> <span>/</span> <a href="gallery.html">Gallery</a> <span>/</span> <span>${product.name}</span>
                </div>
                <div class="product-detail-grid">
                    <div class="product-image-section">
                        <div class="product-main-image">
                            ${product.image
                                ? `<img src="${product.image}" alt="${product.name}">`
                                : `<div class="placeholder-icon">${category?.icon || '📦'}</div>`
                            }
                        </div>
                    </div>
                    <div class="product-info-section">
                        <span class="product-info-badge">${category?.icon} ${category?.name}</span>
                        <h1 class="product-detail-name">${product.name}</h1>
                        <p class="product-detail-brand">${product.brand} · ${product.type}</p>

                        <div class="product-detail-price">
                            <span class="detail-price-current">₹${(product.offerPrice || product.price).toLocaleString()}</span>
                            ${product.offerPrice ? `<span class="detail-price-original">₹${product.price.toLocaleString()}</span>` : ''}
                            ${product.offerPercent ? `<span class="detail-price-badge">${product.offerPercent}% OFF</span>` : ''}
                        </div>

                        <div class="product-detail-rating">
                            <span class="rating-stars">${stars}</span>
                            <span class="rating-value">${product.rating}</span>
                            <span class="rating-label">out of 5</span>
                        </div>

                        ${product.color ? `
                        <div class="product-detail-color">
                            <h4>Color</h4>
                            <span class="color-display">🎨 ${product.color}</span>
                        </div>` : ''}

                        <div class="product-detail-specs">
                            <h4>Specifications</h4>
                            <div class="spec-list">
                                ${specs.map(s => `<div class="spec-item">${s}</div>`).join('')}
                            </div>
                        </div>

                        <div class="product-detail-actions">
                            <button class="btn btn-primary btn-lg" onclick="addToCart('${product.id}')" id="add-to-cart-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                                Add to Cart
                            </button>
                            <button class="btn ${fav ? 'btn-primary' : 'btn-glass'} btn-lg" onclick="handleFavDetail('${product.id}', this)" id="fav-detail-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="${fav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                                ${fav ? 'Favorited' : 'Add to Favorites'}
                            </button>
                        </div>

                        <div class="product-share">
                            <span>Share:</span>
                            <a href="https://wa.me/?text=Check%20out%20${encodeURIComponent(product.name)}%20at%20Sasmika%20Mobiles!%20₹${product.offerPrice || product.price}" class="share-btn" target="_blank" aria-label="Share on WhatsApp">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            </a>
                        </div>

                        <div class="cart-whatsapp-note" style="margin-top: var(--space-6);">
                            💬 Want to order directly? <a href="https://wa.me/918526033272?text=Hi!%20I%20want%20to%20order%20${encodeURIComponent(product.name)}%20(₹${product.offerPrice || product.price})" target="_blank" style="color: #25d366; font-weight: 700;">Chat on WhatsApp</a>
                        </div>
                    </div>
                </div>
            `;
        }

        function handleFavDetail(productId, btn) {
            const isNowFav = toggleFavorite(productId);
            const svg = btn.querySelector('svg path');
            if (isNowFav) {
                btn.className = 'btn btn-primary btn-lg';
                svg.setAttribute('fill', 'currentColor');
                btn.innerHTML = btn.innerHTML.replace('Add to Favorites', 'Favorited');
            } else {
                btn.className = 'btn btn-glass btn-lg';
                svg.setAttribute('fill', 'none');
                btn.innerHTML = btn.innerHTML.replace('Favorited', 'Add to Favorites');
            }
        }

        function renderRelatedProducts(currentId) {
            const product = getProduct(currentId);
            if (!product) return;

            const related = STORE_DATA.products
                .filter(p => p.category === product.category && p.id !== currentId)
                .slice(0, 4);

            const grid = document.getElementById('related-products-grid');
            if (related.length === 0) {
                grid.parentElement.style.display = 'none';
                return;
            }

            grid.innerHTML = related.map(p => createProductCard(p)).join('');
        }
    </script>
</body>
</html>
