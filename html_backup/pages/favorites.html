    <script>
        document.addEventListener('DOMContentLoaded', () => renderFavorites());

        function renderFavorites() {
            const grid = document.getElementById('favorites-grid');
            const favIds = getFavorites();

            if (favIds.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;"><div class="empty-state-icon">❤️</div><h3>No favorites yet</h3><p>Start adding products to your favorites!</p><a href="gallery.html" class="btn btn-primary btn-md">Browse Gallery</a></div>`;
                return;
            }

            const products = favIds.map(id => getProduct(id)).filter(Boolean);
            grid.innerHTML = products.map(p => createProductCard(p)).join('');
        }

        // Override handleFavorite to re-render
        const origHandleFav = handleFavorite;
        handleFavorite = function(productId, btn) {
            origHandleFav(productId, btn);
            setTimeout(renderFavorites, 300);
        };
    </script>
